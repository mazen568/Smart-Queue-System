<div class="settings-page fade-in-up">

  <app-admin-header title="Configure your clinic."
    caption="Update your clinic profile, branding, and public-facing details.">
  </app-admin-header>

  <!-- Error State -->
  @if (error()) {
  <div class="error-banner">{{ error() }}</div>
  }


  <!-- Loading State -->
  @if (loading() && !clinic()) {
  <div class="section-card shimmer"
    style="min-height: 400px; border: none; display: flex; gap: var(--space-8); padding: var(--space-8);">
    <div style="flex: 0 0 250px;">
      <div class="shimmer"
        style="height: 24px; width: 60%; margin-bottom: 12px; border-radius: 4px; background: rgba(0,0,0,0.05);"></div>
      <div class="shimmer" style="height: 16px; width: 80%; border-radius: 4px; background: rgba(0,0,0,0.05);"></div>
    </div>
    <div style="flex: 1;">
      <div class="shimmer"
        style="height: 60px; width: 100%; margin-bottom: 24px; border-radius: 8px; background: rgba(0,0,0,0.05);"></div>
      <div class="shimmer"
        style="height: 60px; width: 100%; margin-bottom: 24px; border-radius: 8px; background: rgba(0,0,0,0.05);"></div>
      <div class="shimmer" style="height: 60px; width: 100%; border-radius: 8px; background: rgba(0,0,0,0.05);"></div>
    </div>
  </div>
  }

  <!-- Clinic Profile Section -->
  @if (clinic()) {
  <div class="section-card">
    <div class="section-left">
      <h3 class="section-title">Clinic profile</h3>
      <p class="section-caption">Public information shown to patients.</p>
    </div>

    <div class="section-right">
      <div class="form-grid">
        <div class="form-group">
          <label class="label">Clinic Name <span class="required">*</span></label>
          <input type="text" class="input" [class.error]="fieldErrors().name" placeholder="e.g. Pulse Medical Center"
            [(ngModel)]="formData.name">
          @if (fieldErrors().name) {
          <span class="field-error">{{ fieldErrors().name }}</span>
          }
        </div>

        <div class="form-group">
          <label class="label">Description</label>
          <input type="text" class="input" placeholder="e.g. General practice & walk-in clinic"
            [(ngModel)]="formData.description">
        </div>

        <div class="form-group">
          <label class="label">Address <span class="required">*</span></label>
          <input type="text" class="input" [class.error]="fieldErrors().address"
            placeholder="e.g. 221 Market St, San Francisco" [(ngModel)]="formData.address">
          @if (fieldErrors().address) {
          <span class="field-error">{{ fieldErrors().address }}</span>
          }
        </div>

        <div class="form-group">
          <label class="label">Clinic Logo</label>
          <div class="upload-area">
            <div class="preview-box">
              <img *ngIf="imagePreview() && !isReadingImage()" [src]="imagePreview()" alt="Clinic Logo">
              <div class="shimmer" *ngIf="isReadingImage()" style="width: 100%; height: 100%;"></div>
              <div class="placeholder-icon" *ngIf="!imagePreview() && !isReadingImage()">📷</div>
            </div>
            <div class="upload-btn-wrapper">
              <button class="btn-outline-sm" [disabled]="isReadingImage()">
                {{ isReadingImage() ? 'Reading...' : 'Choose Image' }}
              </button>
              <input type="file" (change)="onFileSelected($event)" accept="image/*" [disabled]="isReadingImage()">
            </div>
          </div>
          <p class="caption">Recommended: Square image, max 2MB.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="page-footer">
    <app-admin-button 
      label="Save Changes" 
      icon="save" 
      [loading]="saving()"
      (onClick)="saveClinic()">
    </app-admin-button>
  </div>
  }
</div>
