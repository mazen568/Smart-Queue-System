<div class="auth-page">
  <div class="auth-card surface shadow-zone fade-in-up">
    <div class="auth-header">
      <h2 style="margin: 0;">Create your account</h2>
      <p class="caption" style="margin: 6px 0 0;">It takes less than a minute.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="grid-2">
        <div class="field">
          <label class="caption" for="name">Name</label>
          <input id="name" type="text" formControlName="name" placeholder="Your name" />
          <p class="caption error" *ngIf="form.controls.name.touched && form.controls.name.invalid">
            Name is required.
          </p>
        </div>

        <div class="field">
          <label class="caption" for="clinicName">Clinic name</label>
          <input id="clinicName" type="text" formControlName="clinicName" placeholder="Clinic name" />
          <p class="caption error" *ngIf="form.controls.clinicName.touched && form.controls.clinicName.invalid">
            Clinic name is required.
          </p>
        </div>
      </div>

      <div class="field">
        <label class="caption" for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="name@example.com" />
        <p class="caption error" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Please enter a valid email.
        </p>
      </div>

      <div class="grid-2">
        <div class="field">
          <label class="caption" for="password">Password</label>
          <input id="password" type="password" formControlName="password" placeholder="••••••••" />
          <p class="caption error" *ngIf="form.controls.password.touched && form.controls.password.invalid">
            Password must be at least 6 characters.
          </p>
        </div>

        <div class="field">
          <label class="caption" for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••" />
          <p
            class="caption error"
            *ngIf="
              form.controls.confirmPassword.touched &&
              (form.controls.confirmPassword.invalid || form.errors?.['passwordMismatch'])
            "
          >
            Passwords must match.
          </p>
        </div>
      </div>

      <p class="caption error" *ngIf="serverError()">{{ serverError() }}</p>

      <button class="btn btn-primary" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating…' : 'Create account' }}
      </button>
    </form>

    <div class="auth-footer caption">
      Already have an account?
      <a routerLink="/auth/login">Sign in</a>
    </div>
  </div>
</div>
