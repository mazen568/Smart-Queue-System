<div class="action-bar surface-elevated">
  <button class="btn btn-primary action-btn primary-action" 
          (click)="callNext.emit()" 
          [disabled]="isProcessing || waitingCount === 0">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
    Call next
    <span class="shortcut-key">N</span>
  </button>

  <div class="divider"></div>

  <button class="btn btn-ghost action-btn" 
          (click)="skip.emit()" 
          [disabled]="isProcessing || !hasNextTicket">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    Skip
    <span class="shortcut-key outline">S</span>
  </button>

  <button class="btn btn-ghost action-btn" 
          (click)="recall.emit()" 
          [disabled]="isProcessing || !hasCalledTicket">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
    Recall
    <span class="shortcut-key outline">R</span>
  </button>

  <button class="btn btn-ghost action-btn" 
          (click)="markDone.emit()" 
          [disabled]="isProcessing || !hasCalledTicket">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    Mark done
    <span class="shortcut-key outline">D</span>
  </button>
</div>
