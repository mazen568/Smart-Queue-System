<div class="admin-container">
    <!-- Sidebar -->
    <aside class="sidebar" [class.open]="isSidebarOpen()">
        <div class="sidebar-header">
            <div class="logo-icon">P</div>
            <h3 style="margin: 0;">Pulse Admin</h3>
            <button class="menu-close-btn" (click)="toggleSidebar()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <nav class="sidebar-nav">
            <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item" (click)="isSidebarOpen.set(false)">
                <span>Dashboard</span>
            </a>
            <a routerLink="/admin/queues" routerLinkActive="active" class="nav-item" (click)="isSidebarOpen.set(false)">
                <span>Queues</span>
            </a>
            <a routerLink="/admin/staff" routerLinkActive="active" class="nav-item" (click)="isSidebarOpen.set(false)">
                <span>Staff Management</span>
            </a>
            <a routerLink="/admin/settings" routerLinkActive="active" class="nav-item" (click)="isSidebarOpen.set(false)">
                <span>Clinic Settings</span>
            </a>
            <a routerLink="/admin/credits" routerLinkActive="active" class="nav-item" (click)="isSidebarOpen.set(false)">
                <span>Credits</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="logout-btn" (click)="logout()">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle-btn" (click)="toggleSidebar()">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="page-title">Admin Dashboard</div>
            </div>
            <div class="user-actions">
            </div>
        </header>
        <section class="content-viewport">
            <router-outlet></router-outlet>
        </section>
    </main>
</div>
