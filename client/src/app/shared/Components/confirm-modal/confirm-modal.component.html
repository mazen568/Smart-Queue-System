@if (dialogService.state().isOpen) {
  <div class="confirm-overlay" (click)="dialogService.onCancel()">
    <div
      class="confirm-modal"
      [class.type-danger]="dialogService.state().type === 'danger'"
      [class.type-warning]="dialogService.state().type === 'warning'"
      [class.type-info]="dialogService.state().type === 'info'"
      (click)="$event.stopPropagation()"
      role="alertdialog"
      aria-modal="true"
    >
      <div class="confirm-icon">
        @switch (dialogService.state().type) {
          @case ('danger') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18" />
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
              <line x1="10" x2="10" y1="11" y2="17" />
              <line x1="14" x2="14" y1="11" y2="17" />
            </svg>
          }
          @case ('warning') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
              />
              <line x1="12" x2="12" y1="9" y2="13" />
              <line x1="12" x2="12.01" y1="17" y2="17" />
            </svg>
          }
          @case ('info') {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <circle cx="12" cy="16" r="1" />
              <path d="M8 12h.01" />
              <path d="M12 12h.01" />
              <path d="M16 12h.01" />
            </svg>
          }
        }
      </div>
      <h3>{{ dialogService.state().title }}</h3>
      <p>{{ dialogService.state().message }}</p>
      <div class="confirm-actions">
        <button class="btn-cancel" (click)="dialogService.onCancel()">
          {{ dialogService.state().cancelText }}
        </button>
        <button class="btn-confirm" (click)="dialogService.onConfirm()">
          {{ dialogService.state().confirmText }}
        </button>
      </div>
    </div>
  </div>
}
